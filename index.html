<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>House of LouLou's — Mock Door</title>
  <link rel="icon" type="image/png" href="mock-app-icon.png">
  <link rel="apple-touch-icon" href="mock-app-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root { --blue:#162B3B; --cream:#f5f0eb; --dark:#1a1a1a; --warm:#8c7b6b; --accent:#c9a96e; --green:#34c759; --red:#c0392b; --border:rgba(0,0,0,0.07); }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { font-family:'Instrument Serif',serif; }
    body { background:#f2ede8; font-family:'Instrument Serif',serif; color:var(--dark); min-height:100vh; }
    button, input, textarea, select, option { font-family:'Instrument Serif',serif; }
    #evScreen{position:fixed;inset:0;background:var(--blue);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;min-height:100dvh;padding:max(14px, env(safe-area-inset-top)) 24px max(12px, env(safe-area-inset-bottom));overflow-y:auto;}
    .ev-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;width:100%;min-height:0;padding-top:4px;}
    .ev-logo,.logo-img{height:auto;width:auto;display:block;mix-blend-mode:normal;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
    .ev-logo-link{display:inline-flex;line-height:0;margin-bottom:0;-webkit-tap-highlight-color:transparent;}
    .ev-logo-link:focus-visible{outline:2px solid var(--accent);outline-offset:4px;border-radius:4px;}
    .ev-logo{height:62px;margin-bottom:0;}
    .ev-mock-app{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin-top:16px;margin-bottom:0;font-weight:600;}
    .ev-sub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px;margin-top:10px;}
    .ev-list{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}
    .ev-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .18s;}
    .ev-item:active{background:rgba(255,255,255,.1);border-color:var(--accent);}
    .ev-name{font-size:20px;color:#fff;font-style:italic;}
    .ev-date{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:4px;}
    .ev-reset{flex-shrink:0;width:100%;max-width:320px;padding:20px 8px max(16px, env(safe-area-inset-bottom));opacity:.4;background:none;border:none;color:white;font-size:10px;cursor:pointer;text-align:center;}
    #app{display:none;}
    .list-header{background:var(--blue);position:sticky;top:0;z-index:100;}
    .list-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;gap:12px;}
    .logo-link{display:inline-flex;align-items:center;-webkit-tap-highlight-color:transparent;background:none;border:none;padding:0;cursor:pointer;font:inherit;color:inherit;}
    .logo-img{height:28px;display:block;}
    .event-title-row{padding:0 16px 8px;text-align:center;}
    .event-title{font-size:15px;font-style:normal;color:rgba(255,255,255,.92);letter-spacing:.02em;line-height:1.25;}
    .toolbar{display:flex;gap:8px;padding:0 14px 12px;}
    .search-wrap{flex:1;position:relative;}
    .search-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 12px 9px 32px;font-size:13px;color:#fff;outline:none;font-style:italic;}
    .search-input::placeholder{color:rgba(255,255,255,.3);}
    .s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:13px;pointer-events:none;}
    .hbtn{background:none;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 12px;font-size:11px;letter-spacing:.06em;color:#fff;cursor:pointer;white-space:nowrap;}
    .hbtn.nda{border-color:var(--accent);color:var(--accent);}
    .tabs{display:flex;overflow-x:hidden;border-top:1px solid rgba(255,255,255,.07);}
    .tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 2px;font-size:10px;letter-spacing:.02em;text-transform:uppercase;color:rgba(255,255,255,.38);cursor:pointer;white-space:normal;line-height:1.15;text-align:center;flex:1 1 0;min-width:0;transition:all .18s;-webkit-hyphens:auto;hyphens:auto;}
    .tab.active{color:#fff;border-bottom-color:var(--accent);}
    @media(min-width:400px){
      .tab{padding:10px 4px;font-size:11px;letter-spacing:.05em;}
    }
    @media(min-width:520px){
      .tab{padding:11px 8px;font-size:12px;letter-spacing:.08em;}
    }
    .stats{padding:9px 16px;display:flex;gap:14px;background:var(--cream);border-bottom:1px solid var(--border);}
    .stat{font-size:12px;color:var(--warm);font-style:italic;}
    .stat b{color:var(--dark);font-style:normal;font-weight:400;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;}
    @media(min-width:480px){.grid{grid-template-columns:repeat(4,1fr);}}
    @media(min-width:700px){.grid{grid-template-columns:repeat(5,1fr);}}
    .card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:transform .12s;}
    .card:active{transform:scale(.96);}
    .card-photo{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#e8e2da;}
    .card-init{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#ebe5dd,#d9d1c7);display:flex;align-items:center;justify-content:center;font-size:26px;font-style:italic;color:var(--warm);}
    .card-body{padding:7px 8px 8px;}
    .card-name{font-size:11px;color:var(--dark);line-height:1.3;}
    .card-tick{color:var(--blue);font-size:10px;margin-right:2px;}
    .card-tag{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--warm);margin-top:2px;display:flex;align-items:center;gap:3px;}
    .wb-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
    .wb-gold{background:#c9a96e;}
    .wb-black{background:#1a1a1a;border:1px solid #bbb;}
    .cstate{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 20px;gap:14px;}
    .spinner{width:26px;height:26px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .cstate-txt{font-size:13px;color:var(--warm);letter-spacing:.1em;font-style:italic;}
    #detailView{display:none;position:fixed;inset:0;background:#f2ede8;z-index:200;overflow-y:auto;}
    .detail-head{background:var(--blue);padding:0 0 24px;text-align:center;}
    .detail-nav{display:flex;align-items:center;padding:14px 16px 0;}
    .back-btn{background:none;border:none;color:rgba(255,255,255,.92);cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:1;display:flex;align-items:center;padding:4px 0;text-align:left;-webkit-font-smoothing:antialiased;}
    .detail-avatar-wrap{margin-top:14px;display:flex;justify-content:center;}
    .detail-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid #fff;}
    .detail-init{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:30px;font-style:italic;color:#fff;}
    .detail-name{font-size:22px;color:#fff;margin-top:10px;font-style:italic;}
    .detail-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:.06em;}
    .detail-chips{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;padding:0 20px;}
    .det-chip{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border-radius:6px;padding:5px 12px;font-size:11px;text-decoration:none;}
    .det-cards{padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:40px;}
    .det-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .det-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.05);}
    .det-row:last-of-type{border-bottom:none;}
    .det-row-left{display:flex;flex-direction:column;gap:2px;}
    .det-lbl{font-size:14px;color:var(--dark);display:flex;align-items:center;gap:6px;}
    .wb-display{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.05);}
    .wb-display-lbl{font-size:14px;color:var(--dark);margin-bottom:2px;}
    .det-sublbl,.wb-display-note,.modal-wb-note{font-size:11px;color:var(--warm);line-height:1.35;}
    .det-sublbl{margin-top:2px;}
    .wb-display-note{margin-bottom:8px;}
    .wb-pill{display:inline-flex;align-items:center;gap:8px;border-radius:8px;padding:10px 16px;font-size:14px;border:1.5px solid rgba(0,0,0,.08);}
    .wb-pill.none{color:var(--warm);font-style:italic;}
    .wb-pill.gold{background:#fffdf0;border-color:#c9a96e;color:#8a6820;}
    .wb-pill.black{background:#1a1a1a;border-color:#1a1a1a;color:#fff;}
    .wb-circle{width:12px;height:12px;border-radius:50%;}
    .wb-circle.gold{background:#c9a96e;}
    .wb-circle.black{background:#fff;}
    .nda-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff5f5;border-top:1px solid rgba(0,0,0,.05);}
    .nda-text{font-size:12px;color:var(--red);display:flex;align-items:flex-start;gap:6px;line-height:1.5;flex:1;}
    .nda-link{font-size:18px;cursor:pointer;flex-shrink:0;text-decoration:none;}
    .toggle{position:relative;width:51px;height:31px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;position:absolute;}
    .slider{position:absolute;cursor:pointer;inset:0;background:#e0dad3;border-radius:31px;transition:.2s;}
    .slider:before{content:'';position:absolute;width:25px;height:25px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.15);}
    .toggle input:checked+.slider{background:var(--green);}
    .toggle input:checked+.slider:before{transform:translateX(20px);}
    .saving-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;letter-spacing:.06em;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;}
    .saving-toast.show{opacity:1;}
    .det-input-wrap{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.05);}
    .det-input-wrap:last-child{border-bottom:none;}
    .det-input-lbl{font-size:13px;color:var(--dark);display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .det-input{width:100%;background:#f5f2ee;border:none;border-radius:8px;padding:10px 14px;font-size:14px;color:var(--warm);outline:none;font-style:italic;}
    .det-input::placeholder{color:#bbb5ae;}
    textarea.det-input{resize:none;min-height:80px;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-bg.open{opacity:1;pointer-events:all;}
    .modal{background:#f2ede8;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:40px;}
    .modal-handle{width:36px;height:4px;background:rgba(0,0,0,.1);border-radius:2px;margin:12px auto 0;}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
    .modal-title{font-size:22px;font-style:italic;color:var(--dark);}
    .modal-close{background:none;border:none;font-size:22px;color:var(--warm);cursor:pointer;}
    .modal-body{padding:0 14px;display:flex;flex-direction:column;gap:10px;}
    .modal-card{background:#fff;border-radius:14px;overflow:hidden;}
    .modal-row{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.05);display:flex;align-items:center;gap:10px;}
    .modal-row:last-child{border-bottom:none;}
    .modal-ico{font-size:16px;flex-shrink:0;}
    .modal-field{flex:1;}
    .modal-field-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--warm);margin-bottom:2px;}
    .modal-input{width:100%;background:none;border:none;outline:none;font-size:15px;color:var(--dark);font-style:italic;}
    .modal-input::placeholder{color:#c0b8ae;}
    .modal-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.05);}
    .modal-toggle-row:last-child{border-bottom:none;}
    .modal-toggle-lbl{font-size:14px;color:var(--dark);display:flex;align-items:center;gap:8px;}
    .modal-wb-block{padding:14px 16px;border-top:1px solid rgba(0,0,0,.05);}
    .modal-wb-lbl{font-size:14px;color:var(--dark);margin-bottom:2px;}
    .modal-nda-hint{padding:10px 16px 14px;font-size:12px;color:var(--red);display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid rgba(0,0,0,.05);line-height:1.4;}
    .modal-nda-link{font-size:16px;text-decoration:none;flex-shrink:0;}
    .modal-actions{display:flex;gap:10px;padding:14px 14px 0;}
    .mcancel{flex:1;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:14px;font-size:13px;cursor:pointer;color:var(--dark);font-style:italic;}
    .msubmit{flex:2;background:var(--blue);border:none;border-radius:12px;padding:14px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#fff;cursor:pointer;font-weight:500;}
  </style>
</head>
<body>
  <div class="saving-toast" id="toast">Saved ✓</div>

  <div id="evScreen">
    <div class="ev-main">
      <a class="ev-logo-link" href="https://www.houseofloulous.com/" target="_blank" rel="noopener noreferrer" title="House of LouLou's — main site">
        <img class="ev-logo" src="https://cdn.jsdelivr.net/gh/houseofloulous/loulous-doorlist@main/LL%20white%20logo%20name%20only.png" alt="LouLou's">
      </a>
      <div class="ev-mock-app">Mock app</div>
      <div class="ev-sub">Select Event</div>
      <div class="ev-list" id="evList"></div>
    </div>
    <button type="button" class="ev-reset" onclick="resetKey()">Reset password</button>
  </div>

  <div id="app">
    <div class="list-header">
      <div class="list-top">
        <button type="button" class="logo-link" onclick="showEvScreen()" title="Back to Select Event" aria-label="Back to Select Event">
          <img class="logo-img" src="https://cdn.jsdelivr.net/gh/houseofloulous/loulous-doorlist@main/LL%20white%20logo%20name%20only.png" alt="LouLou's">
        </button>
      </div>
      <div class="event-title-row"><div class="event-title" id="eventTitle">L'Atelier | March 28th</div></div>
      <div class="toolbar">
        <div class="search-wrap">
          <span class="s-icon">⌕</span>
          <input class="search-input" id="searchInput" type="text" placeholder="Search guests…" oninput="render()">
        </div>
        <button class="hbtn" onclick="openAdd()">+ ADD NEW GUEST</button>
        <button class="hbtn nda" onclick="window.open('https://forms.gle/asRXJtR6zHhDoGZJ8','_blank')">NDA</button>
      </div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div class="stats" id="stats"></div>
    <div id="main"></div>
  </div>

  <div id="detailView"><div id="detailContent"></div></div>

  <div class="modal-bg" id="addModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-head">
        <div class="modal-title">Add New Guest</div>
        <button class="modal-close" onclick="closeAdd()">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-card">
          <div class="modal-row">
            <span class="modal-ico">👤</span>
            <div class="modal-field">
              <div class="modal-field-lbl">Guest Name <span style="color:var(--red)">Required</span></div>
              <input class="modal-input" id="aN" placeholder="Enter guest's full name">
            </div>
          </div>
        </div>
        <div class="modal-card">
          <div class="modal-toggle-row"><div class="modal-toggle-lbl">✓ Checked In</div><label class="toggle"><input type="checkbox" id="mCI"><span class="slider"></span></label></div>
          <div class="modal-wb-block">
            <div class="modal-wb-lbl">Wristbands</div>
            <div class="modal-wb-note"></div>
          </div>
          <div class="modal-toggle-row"><div class="modal-toggle-lbl">🤫 NDA Signed</div><label class="toggle"><input type="checkbox" id="mNDA" onchange="onAddNDAChange(this)"><span class="slider"></span></label></div>
          <div id="mNdaHint" class="modal-nda-hint"><span>🔴 If NDA is unsigned, please click here and have them sign:</span><a class="modal-nda-link" href="https://forms.gle/asRXJtR6zHhDoGZJ8" target="_blank">🔗</a></div>
        </div>
        <div class="modal-card">
          <div class="modal-row">
            <span class="modal-ico">🧥</span>
            <div class="modal-field">
              <div class="modal-field-lbl">Coat Check #</div>
              <input class="modal-input" id="mCoat" placeholder="Enter coat check number">
            </div>
          </div>
          <div class="modal-row">
            <span class="modal-ico">📱</span>
            <div class="modal-field">
              <div class="modal-field-lbl">Phone Check #</div>
              <input class="modal-input" id="mPhone" placeholder="Enter phone check number">
            </div>
          </div>
        </div>
        <div class="modal-card">
          <div class="modal-row" style="align-items:flex-start">
            <span class="modal-ico" style="margin-top:2px">📝</span>
            <div class="modal-field">
              <div class="modal-field-lbl">Door Notes <span style="color:var(--red)">Required</span></div>
              <textarea class="modal-input" id="mNotes" rows="3" placeholder="Any additional info including who approved them (Sam, Daniel & LouLou are the only ones who can)" style="resize:none;line-height:1.5"></textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="mcancel" onclick="closeAdd()">Cancel</button>
        <button class="msubmit" id="addBtn" onclick="doAdd()">Add Guest</button>
      </div>
    </div>
  </div>

  <script>
    const WB_NOTE='🖤 Verified STI Results receive BLACK WRISTBANDS';
    const PRACTICE_PASS='practice';
    const LS_KEY='ll_door_practice_pass';

    /** Stock-style face placeholders (strangers — not your guests). Same face per seed. */
    function mockAvatar(seed){
      let h=0;
      for(let i=0;i<seed.length;i++)h=(Math.imul(31,h)+seed.charCodeAt(i))|0;
      const n=(Math.abs(h)%70)+1;
      return 'https://i.pravatar.cc/400?img='+n;
    }

    const EVENTS=[
      {name:"L'Atelier",date:"March 28th",table:'mock-latelier'},
      {name:"Do Not Disturb",date:"April 18th",table:'mock-dnd'},
      {name:"Obscura",date:"May 2nd",table:'mock-obscura'},
    ];

    const MOCK_GUESTS={
      'mock-latelier':[
        {id:'ml-01',name:'Jordan Sample',checkedIn:true,rsvp:'Confirmed',photo:mockAvatar('JordanSample1'),list:'Guest',nda:'Signed',phone:'555-0101',patron:false,wristband:'Gold',email:'jordan.sample@example.com'},
        {id:'ml-02',name:'Alex Demo',checkedIn:false,rsvp:'Maybe',photo:mockAvatar('AlexDemo2'),list:'Guest',nda:'No',phone:'555-0102',patron:false,wristband:'',email:'alex.demo@example.com'},
        {id:'ml-03',name:'Riley Practice',checkedIn:true,rsvp:'Confirmed',photo:mockAvatar('RileyP3'),list:'Table',nda:'Signed',phone:'555-0103',patron:true,wristband:'Gold',email:'riley.p@example.com'},
        {id:'ml-04',name:'Casey Mock',checkedIn:false,rsvp:'',photo:mockAvatar('CaseyM4'),list:'Working',nda:'No',phone:'555-0104',patron:false,wristband:'Black',email:''},
        {id:'ml-05',name:'Taylor Drill',checkedIn:false,rsvp:'Waitlist',photo:mockAvatar('TaylorD5'),list:'Guest',nda:'No',phone:'555-0105',patron:false,wristband:'',email:'t.drill@example.com'},
        {id:'ml-06',name:'Morgan Faux',checkedIn:true,rsvp:'Confirmed',photo:mockAvatar('MorganF6'),list:'Patron',nda:'Signed',phone:'555-0106',patron:true,wristband:'Gold',email:'morgan.f@example.com'},
        {id:'ml-07',name:'Jamie Rehearsal',checkedIn:false,rsvp:'',photo:mockAvatar('JamieR7'),list:'Guest',nda:'Signed',phone:'555-0107',patron:false,wristband:'',email:''},
        {id:'ml-08',name:'Quinn Sandbox',checkedIn:false,rsvp:'Confirmed',photo:mockAvatar('QuinnS8'),list:'Table',nda:'No',phone:'555-0108',patron:false,wristband:'',email:'quinn.s@example.com'},
        {id:'ml-09',name:'Drew Example',checkedIn:true,rsvp:'Confirmed',photo:mockAvatar('DrewE9'),list:'Working',nda:'Signed',phone:'555-0109',patron:false,wristband:'Black',email:'drew.ex@example.com'},
        {id:'ml-10',name:'Skyler Test',checkedIn:false,rsvp:'Maybe',photo:mockAvatar('SkylerT10'),list:'Guest',nda:'No',phone:'555-0110',patron:false,wristband:'',email:''},
        {id:'ml-11',name:'Reese Placeholder',checkedIn:true,rsvp:'Confirmed',photo:mockAvatar('ReeseP11'),list:'Guest',nda:'Signed',phone:'555-0111',patron:false,wristband:'Gold',email:'reese.p@example.com'},

        {id:'md-04',name:'Rowan Practice',checkedIn:true,rsvp:'Confirmed',photo:mockAvatar('RowanP4'),list:'Working',nda:'Signed',phone:'555-0204',patron:false,wristband:'Black',email:'rowan.p@example.com'},
        {id:'md-05',name:'Emerson Drill',checkedIn:false,rsvp:'Waitlist',photo:mockAvatar('EmeD5'),list:'Guest',nda:'No',phone:'555-0205',patron:false,wristband:'',email:''},

      ],
      'mock-obscura':[
        {id:'mo-01',name:'Indigo Sample',checkedIn:false,rsvp:'Premiere',photo:mockAvatar('Indigo1'),list:'Guest',nda:'Signed',phone:'555-0301',patron:false,wristband:'',email:'indigo@example.com'},
        {id:'mo-02',name:'Vesper Demo',checkedIn:true,rsvp:'Premiere',photo:mockAvatar('Vesper2'),list:'Guest',nda:'Signed',phone:'555-0302',patron:false,wristband:'Gold',email:''},
        {id:'mo-03',name:'Sable Mock',checkedIn:false,rsvp:'',photo:mockAvatar('Sable3'),list:'Table',nda:'No',phone:'555-0303',patron:false,wristband:'',email:'sable.m@example.com'},
        {id:'mo-04',name:'Raven Practice',checkedIn:true,rsvp:'Premiere',photo:mockAvatar('Raven4'),list:'Working',nda:'Signed',phone:'555-0304',patron:false,wristband:'Black',email:'raven.p@example.com'},
        {id:'mo-05',name:'Onyx Drill',checkedIn:false,rsvp:'Maybe',photo:mockAvatar('Onyx5'),list:'Guest',nda:'No',phone:'555-0305',patron:false,wristband:'',email:''},
        {id:'mo-06',name:'Echo Faux',checkedIn:false,rsvp:'Premiere',photo:mockAvatar('Echo6'),list:'Patron',nda:'Signed',phone:'555-0306',patron:true,wristband:'Gold',email:'echo.f@example.com'},
        {id:'mo-07',name:'Nova Rehearsal',checkedIn:true,rsvp:'',photo:mockAvatar('Nova7'),list:'Guest',nda:'Signed',phone:'555-0307',patron:false,wristband:'',email:'nova.r@example.com'},
        {id:'mo-08',name:'Lux Sandbox',checkedIn:false,rsvp:'Premiere',photo:mockAvatar('Lux8'),list:'Table',nda:'No',phone:'555-0308',patron:false,wristband:'',email:''},
        {id:'mo-09',name:'Solstice Example',checkedIn:false,rsvp:'Confirmed',photo:mockAvatar('Sol9'),list:'Guest',nda:'Signed',phone:'555-0309',patron:false,wristband:'',email:'solstice@example.com'},
        {id:'mo-10',name:'Eclipse Test',checkedIn:false,rsvp:'Premiere',photo:mockAvatar('Eclipse10'),list:'Guest',nda:'No',phone:'555-0310',patron:false,wristband:'',email:''},
        {id:'mo-11',name:'Astra Placeholder',checkedIn:true,rsvp:'VIP',photo:mockAvatar('Astra11'),list:'Patron',nda:'Signed',phone:'555-0311',patron:true,wristband:'Gold',email:'astra.p@example.com'},
      ],
    };

    const TABS=[
      {id:'all',lbl:'Full List'},
      {id:'guest',lbl:'Guests'},
      {id:'patron',lbl:'Patrons'},
      {id:'table',lbl:'Table'},
      {id:'working',lbl:'Working'},
    ];

    let guests=[],curTab='all',curTable='',curG=null,local={};
    let originalWristband='';

    function ensurePracticeAuth(){
      const ok=(localStorage.getItem(LS_KEY)||'')===PRACTICE_PASS;
      if(ok) return;
      const entered=(prompt('Mock app password:')||'').trim();
      if(entered!==PRACTICE_PASS){
        alert('Wrong password — use: practice');
        throw new Error('Auth failed');
      }
      localStorage.setItem(LS_KEY,PRACTICE_PASS);
    }

    function resetKey(){
      localStorage.removeItem(LS_KEY);
      location.reload();
    }

    function showToast(msg='Saved ✓'){
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),1800);
    }
    function esc(s=''){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function ini(n){ return n.split(' ').map(p=>p[0]||'').join('').substring(0,2).toUpperCase(); }

    function buildEvList(){
      document.getElementById('evList').innerHTML=EVENTS.map((e,i)=>
        `<div class="ev-item" onclick="pickEv(${i})"><div class="ev-name">${esc(e.name)}</div><div class="ev-date">${esc(e.date)}</div></div>`
      ).join('');
    }

    function cloneMockGuests(key){
      const raw=MOCK_GUESTS[key]||[];
      return raw.map(g=>({...g}));
    }

    function pickEv(i){
      const e=EVENTS[i]; curTable=e.table;
      document.getElementById('eventTitle').textContent=e.name+' | '+e.date;
      document.getElementById('evScreen').style.display='none';
      document.getElementById('app').style.display='block';
      load();
    }

    function showEvScreen(){
      document.getElementById('evScreen').style.display='flex';
      document.getElementById('app').style.display='none';
      document.getElementById('detailView').style.display='none';
    }

    function sortGuestsByName(list){
      return [...list].sort((a,b)=>{
        const an=(a?.name||'').trim();
        const bn=(b?.name||'').trim();
        return an.localeCompare(bn,undefined,{sensitivity:'base'});
      });
    }

    async function load(){
      document.getElementById('main').innerHTML='<div class="cstate"><div class="spinner"></div><div class="cstate-txt">Opening the doors…</div></div>';
      buildTabs();
      try{
        ensurePracticeAuth();
        await new Promise(r=>setTimeout(r,350));
        guests=sortGuestsByName(cloneMockGuests(curTable));
        render();
      }catch(e){
        document.getElementById('main').innerHTML=`<div class="cstate"><div class="cstate-txt" style="color:var(--red)">${esc(e.message||'Could not load')}</div><br><button onclick="resetKey()" style="margin-top:10px;padding:8px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;">Reset password</button></div>`;
      }
    }

    function buildTabs(){
      document.getElementById('tabs').innerHTML=TABS.map(t=>
        `<button class="tab ${t.id===curTab?'active':''}" onclick="setTab('${t.id}')">${t.lbl}</button>`
      ).join('');
    }
    function setTab(id){curTab=id;buildTabs();render();}

    function render(){
      const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
      let list=guests;
      if(curTab==='patron') list=list.filter(g=>g.patron);
      else if(curTab==='guest') list=list.filter(g=>(g.list||'').toLowerCase()==='guest');
      else if(curTab==='working') list=list.filter(g=>(g.list||'').toLowerCase()==='working');
      else if(curTab==='table') list=list.filter(g=>(g.list||'').toLowerCase()==='table');
      if(q) list=list.filter(g=>g.name.toLowerCase().includes(q)||(g.phone||'').includes(q));
      list=sortGuestsByName(list);
      const chk=list.filter(g=>g.checkedIn).length;
      document.getElementById('stats').innerHTML=`<div class="stat"><b>${list.length}</b> guests</div><div class="stat"><b>${chk}</b> checked in</div>`;
      if(!list.length){
        document.getElementById('main').innerHTML='<div class="cstate"><div class="cstate-txt">No guests found</div></div>';
        return;
      }
      document.getElementById('main').innerHTML=`<div class="grid">${list.map(gCard).join('')}</div>`;
    }

    function gCard(g){
      const ph=g.photo
        ?`<img class="card-photo" src="${esc(g.photo)}" loading="lazy" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-init" style="display:none">${ini(g.name)}</div>`
        :`<div class="card-init">${ini(g.name)}</div>`;
      const dot=g.wristband==='Gold'?`<span class="wb-dot wb-gold"></span>`:g.wristband==='Black'?`<span class="wb-dot wb-black"></span>`:'';
      return `<div class="card" onclick="openDetail('${g.id}')">
        ${ph}
        <div class="card-body">
          <div class="card-name">${g.checkedIn?'<span class="card-tick">✓</span>':''}${esc(g.name)}</div>
          <div class="card-tag">${dot}${esc(g.list||'')}</div>
        </div>
      </div>`;
    }

    function openDetail(id){
      const g=guests.find(x=>x.id===id); if(!g) return;
      curG=g;
      originalWristband=g.wristband||'';
      const loc=local[id]||{};
      const ph=g.photo?`<img class="detail-avatar" src="${esc(g.photo)}" alt="">`:`<div class="detail-init">${ini(g.name)}</div>`;
      const wbPill=g.wristband==='Gold'
        ?`<div class="wb-pill gold"><span class="wb-circle gold"></span>Gold</div>`
        :g.wristband==='Black'
          ?`<div class="wb-pill black"><span class="wb-circle black"></span>Black</div>`
          :`<div class="wb-pill none">No wristbands assigned</div>`;
      const ndaRow=g.nda!=='Signed'
        ?`<div class="nda-row"><div class="nda-text">🔴 If NDA is unsigned, please click here and have them sign:</div><a class="nda-link" href="https://forms.gle/asRXJtR6zHhDoGZJ8" target="_blank">🔗</a></div>`
        :'';

      document.getElementById('detailContent').innerHTML=`
        <div class="detail-head">
          <div class="detail-nav"><button type="button" class="back-btn" onclick="closeDetail()" aria-label="Back to guest list">BACK</button></div>
          <div class="detail-avatar-wrap">${ph}</div>
          <div class="detail-name">${esc(g.name)}</div>
          <div class="detail-sub">${esc(g.list||'')}${g.rsvp?' · RSVP: '+esc(g.rsvp):''}</div>
          <div class="detail-chips">
            ${g.phone?`<a class="det-chip" href="tel:${esc(g.phone)}">📞 ${esc(g.phone)}</a>`:''}
            ${g.email?`<a class="det-chip" href="mailto:${esc(g.email)}">✉️ ${esc(g.email)}</a>`:''}
          </div>
        </div>
        <div class="det-cards">
          <div class="det-card">
            <div class="det-row">
              <div class="det-lbl">✓ Checked In:</div>
              <label class="toggle"><input type="checkbox" id="dCI" ${g.checkedIn?'checked':''} onchange="autoSave()"><span class="slider"></span></label>
            </div>
            <div class="wb-display">
              <div class="wb-display-lbl">Wristbands</div>
              <div class="wb-display-note">${WB_NOTE}</div>
              <div id="wbPillDisplay">${wbPill}</div>
            </div>
            <div class="det-row">
              <div class="det-row-left">
                <div class="det-lbl">👑 Patron</div>
                <div class="det-sublbl">Patrons receive GOLD WRISTBANDS</div>
              </div>
              <label class="toggle"><input type="checkbox" id="dPat" ${g.patron?'checked':''} onchange="onPatron(this)"><span class="slider"></span></label>
            </div>
            <div class="det-row">
              <div class="det-lbl">🤫 NDA Signed:</div>
              <label class="toggle"><input type="checkbox" id="dNDA" ${g.nda==='Signed'?'checked':''} onchange="onNDA(this)"><span class="slider"></span></label>
            </div>
            <div id="ndaBox">${ndaRow}</div>
          </div>
          <div class="det-card">
            <div class="det-input-wrap">
              <div class="det-input-lbl">🧥 Coat Check #</div>
              <input class="det-input" id="dCoat" value="${esc(loc.coat||'')}" placeholder="e.g. 69" onblur="saveLocal()">
            </div>
            <div class="det-input-wrap">
              <div class="det-input-lbl">📱 Phone Check #</div>
              <input class="det-input" id="dPhone" value="${esc(loc.phone||'')}" placeholder="e.g. 69" onblur="saveLocal()">
            </div>
          </div>
          <div class="det-card">
            <div class="det-input-wrap">
              <div class="det-input-lbl">📝 Door Notes:</div>
              <textarea class="det-input" id="dNotes" placeholder="Enter any additional notes" onblur="saveLocal()">${esc(loc.notes||'')}</textarea>
            </div>
          </div>
        </div>`;
      document.getElementById('app').style.display='none';
      document.getElementById('detailView').style.display='block';
      document.getElementById('detailView').scrollTop=0;
    }

    function updateWBPill(wb){
      const p=wb==='Gold'
        ?`<div class="wb-pill gold"><span class="wb-circle gold"></span>Gold</div>`
        :wb==='Black'
          ?`<div class="wb-pill black"><span class="wb-circle black"></span>Black</div>`
          :`<div class="wb-pill none">No wristbands assigned</div>`;
      document.getElementById('wbPillDisplay').innerHTML=p;
    }

    function onPatron(cb){
      if(cb.checked){
        updateWBPill('Gold');
      }else{
        updateWBPill(originalWristband==='Black'?'Black':'');
      }
      autoSave();
    }

    function onNDA(cb){
      document.getElementById('ndaBox').innerHTML=cb.checked?'':`<div class="nda-row"><div class="nda-text">🔴 If NDA is unsigned, please click here and have them sign:</div><a class="nda-link" href="https://forms.gle/asRXJtR6zHhDoGZJ8" target="_blank">🔗</a></div>`;
      autoSave();
    }

    function onAddNDAChange(cb){
      const hint=document.getElementById('mNdaHint');
      if(!hint)return;
      hint.style.display=cb.checked?'none':'flex';
    }

    function saveLocal(){
      if(!curG)return;
      local[curG.id]={
        coat:document.getElementById('dCoat').value.trim(),
        phone:document.getElementById('dPhone').value.trim(),
        notes:document.getElementById('dNotes').value.trim()
      };
      showToast('Saved (practice) ✓');
    }

    let saveTimer=null;
    function autoSave(){
      clearTimeout(saveTimer);
      saveTimer=setTimeout(()=>{
        if(!curG)return;
        const cI=document.getElementById('dCI').checked;
        const cN=document.getElementById('dNDA').checked;
        const cP=document.getElementById('dPat').checked;
        const wb=cP?'Gold':(originalWristband==='Black'?'Black':'');
        const i=guests.findIndex(g=>g.id===curG.id);
        if(i>-1){
          Object.assign(guests[i],{
            checkedIn:cI,
            nda:cN?'Signed':'No',
            patron:cP,
            wristband:wb
          });
        }
        showToast('Saved (practice) ✓');
      },400);
    }

    function closeDetail(){
      document.getElementById('detailView').style.display='none';
      document.getElementById('app').style.display='block';
      curG=null;
      render();
    }

    function openAdd(){
      document.getElementById('addModal').classList.add('open');
      document.getElementById('aN').focus();
      const nda=document.getElementById('mNDA');
      if(nda) onAddNDAChange(nda);
    }

    function closeAdd(){
      document.getElementById('addModal').classList.remove('open');
      ['aN','mCoat','mPhone','mNotes'].forEach(id=>document.getElementById(id).value='');
      ['mCI','mNDA'].forEach(id=>document.getElementById(id).checked=false);
      onAddNDAChange({checked:false});
    }

    function doAdd(){
      const name=document.getElementById('aN').value.trim();
      if(!name){alert('Guest name required');return;}
      const btn=document.getElementById('addBtn');
      btn.textContent='Adding…';

      const id='mock-'+Date.now();
      const g={
        id,
        name,
        checkedIn:!!document.getElementById('mCI').checked,
        rsvp:'',
        photo:mockAvatar('new-'+id),
        list:'Guest',
        nda:document.getElementById('mNDA').checked?'Signed':'No',
        phone:'555-0199',
        patron:false,
        wristband:'',
        email:''
      };
      const coat=document.getElementById('mCoat').value.trim();
      const ph=document.getElementById('mPhone').value.trim();
      const notes=document.getElementById('mNotes').value.trim();
      local[id]={coat,phone:ph,notes};
      guests.push(g);
      guests=sortGuestsByName(guests);
      closeAdd();
      render();
      showToast('Added (practice only) ✓');
      btn.textContent='Add Guest';
    }

    document.querySelector('.modal-wb-note').textContent=WB_NOTE;
    buildEvList();
  </script>
</body>
</html>
